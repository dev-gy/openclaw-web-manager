# ============================================================
# OpenClaw Web Manager — Docker Compose (Production)
# ============================================================
#
# 사용법:
#   docker compose up -d          # 프로덕션 실행
#   docker compose up -d --build  # 이미지 재빌드 후 실행
#   docker compose logs -f        # 로그 확인
#
# 환경변수 (.env 파일 또는 쉘에서 설정):
#   OWM_GATEWAY_TOKEN   - 게이트웨이 인증 토큰 (미설정시 자동 생성)
#   OWM_GATEWAY_PORT    - 게이트웨이 포트 (기본: 18789)
#   OWM_COOKIE_SECRET   - 세션 쿠키 암호화 키 (미설정시 자동 생성/보존)
#   OWM_ADMIN_PASS      - 초기 관리자 비밀번호 (미설정시 admin)
#   OWM_PORT            - 웹 UI 포트 (기본: 3000)
#   ANTHROPIC_API_KEY   - Anthropic (Claude) API 키
#   OPENAI_API_KEY      - OpenAI (GPT) API 키
#   LLM_BASE_URL        - OpenAI-compatible 커스텀 URL (Ollama 등)

services:
  owm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-web-manager
    restart: unless-stopped
    ports:
      - "${OWM_PORT:-3000}:3000"
    volumes:
      - owm-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - OWM_DB_PATH=/app/data/owm.db
      # Optional: set if you want a fixed bootstrap value.
      - OWM_COOKIE_SECRET=${OWM_COOKIE_SECRET:-}
      - OWM_ADMIN_PASS=${OWM_ADMIN_PASS:-}
      - OWM_GATEWAY_TOKEN=${OWM_GATEWAY_TOKEN:-}
      - OWM_GATEWAY_PORT=${OWM_GATEWAY_PORT:-18789}
      # LLM API 키 (최소 하나 필수 — 미설정시 데모 모드)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  owm-data:
    driver: local
